body:
  text: 喪服要集宗譜始封之君別子一人為祖杜佑通典卷七十三傳純問賀循要記云云引杜氏循其文義宜為此篇之首據補別子者君嫡妻之子長子之母弟也君命為祖其子則為大宗常有一主審昭穆之序辨親疏之別是故百代不遷若無子則支子為後雖七十無無主婦若殤死則縗絰加一等以兄弟之列代之殤無為父道兄弟昭穆同故也死皆為之𪗋縗其月數各隨親疏為限雖尊雖出嫁猶不敢降也屬絕則為之𪗋縗三月若始封君相傳則自祖始封君其支子孫皆宗大宗然則繼體為宗中之尊支庶莫敢宗之是以命別子為宗主一宗奉之故曰祖者高祖也言屬逮於君則就君屬絕於君則適宗子家也而說者或云君代代得立大宗或云別子之母弟亦得為祖或云命妾子為別子其適妻子則遷宗於君皆非也別子之弟子孫無貴賤皆宜宗別子之子孫小宗一家之長也同族則宗之其服隨親疏為比姊妹出嫁不敢降之五屬斷服則不宗之矣通典卷七十三引杜元凱宗譜要集篇目可考者僅此錄於卷首其他佚文散列於後始死葬銘凡卿大夫士各以其官婦人則以姓行虞世南北堂書鈔卷九十二凡挽天子六綍諸侯四大夫二士一徐堅初學記卷十四九仞旒委地遺車易以轝床舉奠祭之具及器藏物皆覆以白練通典卷七十九諸侯建大旂杠七仞斿至地畫熊虎龍文曰旂也通典卷八十四卿建旃六斿至軫孤卿次三公也通帛為旃謂純赤也同上天子諸侯雖卒哭除服其練祥日必有位矣通典卷八十二博士許翰議引杜元凱父在為母冠縗裳絰帶皆疏縗疏麤也通典卷八十四三年者始死之制如不杖周同上二十五月大祥祭主人夕為期朝服縞冠訖祭而受布深衣十五升外無哭者謂哀至入即位而哭也通典卷八十七削杖圓削之象竹取其便也同上削杖二字據通典補若父母同日卒其葬先母後父皆服斬縗其虞祔先父後母其服卒事反服父服若父巳葬而母卒則服母之服至虞訖反服既練則服母之服喪可除則服父之服以除之訖而服母之服通典卷九十七自天子諸侯以下若赴時速葬則赴虞至平坐必須其哀殺也若過時不葬則以麻終喪而除至葬復修服既祔明一月練而祭又明一月大祥而祭必再祭者象本當再歲故也若二十五月而葬則便祥除不復練也通典卷一百二
